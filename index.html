<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест бойынша білімді тексеру</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        success: '#52C41A',
                        danger: '#FF4D4F',
                        warning: '#FAAD14',
                        light: '#F7F8FA',
                        dark: '#1D2129'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },

            }
        }

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .option-item {
                @apply border border-gray-200 rounded-lg p-4 mb-3 cursor-pointer transition-all duration-200 hover:border-primary hover:bg-blue-50;
            }
            .option-item.selected {
                @apply border-primary bg-blue-100;
            }
            .btn-primary {
                @apply bg-primary text-white px-6 py-3 rounded-lg font-medium transition-all duration-200 hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .card {
                @apply bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6;

<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">

            </div>

            <div class="grid gap-6 md:grid-cols-1 lg:grid-cols-1 max-w-2xl mx-auto">

                        <i class="fa fa-list-ol"></i>
                    </div>
                    <div>

                    </div>
                </button>

                <button onclick="showPartSelection()" class="card text-left flex items-center gap-4 hover:shadow-md transition-shadow">
                    <div class="w-12 h-12 rounded-full bg-secondary/10 text-secondary flex items-center justify-center text-xl">
                        <i class="fa fa-th-large"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-dark">Бөліктер бойынша жауап беру</h3>

                    </div>
                </button>

                <button onclick="startTest('random')" class="card text-left flex items-center gap-4 hover:shadow-md transition-shadow">
                    <div class="w-12 h-12 rounded-full bg-warning/10 text-warning flex items-center justify-center text-xl">
                        <i class="fa fa-random"></i>
                    </div>

                    </div>
                </button>
            </div>
        </div>

        <!-- Выбор части -->

            </div>

            <div class="grid gap-4 max-w-md mx-auto">
                <button onclick="startTest('part1')" class="card text-center py-4 hover:shadow-md transition-shadow">

                <button onclick="startTest('part2')" class="card text-center py-4 hover:shadow-md transition-shadow">

                <button onclick="startTest('part3')" class="card text-center py-4 hover:shadow-md transition-shadow">

                <div class="text-gray-500">

                </div>
            </div>

            <div id="questionsContainer">
                <!-- Сұрақтар осында шығады -->
            </div>

                <button onclick="goBack()" class="text-gray-500 hover:text-dark flex items-center gap-2">

                </button>
                <button onclick="finishTest()" class="btn-primary">Тесті аяқтау</button>

        <div class="card text-center">

        // Осы жерден кейін кодтың қалған бөлігі жалғасады
        let currentQuestions = [];

        function showPartSelection() {
            document.getElementById('homePage').classList.replace('block', 'hidden');
            document.getElementById('partSelectionPage').classList.replace('hidden', 'block');
        }

        function goBack() {
            document.getElementById('homePage').className = 'block';
            document.getElementById('partSelectionPage').className = 'hidden';
            document.getElementById('testPage').className = 'hidden';
            document.getElementById('resultPage').className = 'hidden';
        }

        function startTest(mode) {
            document.getElementById('homePage').className = 'hidden';
            document.getElementById('partSelectionPage').className = 'hidden';
            document.getElementById('testPage').className = 'block';

            if (mode === 'all') {
                currentQuestions = [...testData];
                document.getElementById('testTitle').innerText = "Барлық сұрақтар";
            } else if (mode === 'random') {
                currentQuestions = [...testData].sort(() => 0.5 - Math.random()).slice(0, 50);
                document.getElementById('testTitle').innerText = "Кездейсоқ 50 сұрақ";
            } else if (mode === 'part1') {
                currentQuestions = testData.filter(q => q.id <= 40);
                document.getElementById('testTitle').innerText = "1-бөлім";
            } else if (mode === 'part2') {
                currentQuestions = testData.filter(q => q.id > 40 && q.id <= 80);
                document.getElementById('testTitle').innerText = "2-бөлім";
            } else if (mode === 'part3') {
                currentQuestions = testData.filter(q => q.id > 80);
                document.getElementById('testTitle').innerText = "3-бөлім";
            }

            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            document.getElementById('questionCount').innerText = `1 - ${currentQuestions.length}`;
            container.innerHTML = '';

            currentQuestions.forEach((question, index) => {
                const questionBlock = document.createElement('div');
                questionBlock.className = 'card';
                questionBlock.innerHTML = `
                    <p class="font-bold mb-4">${index + 1}. ${question.question}</p>
                    <div class="space-y-2">
                        ${question.options.map((option, optIndex) => {
                            const letter = String.fromCharCode(65 + optIndex);
                            return `
                                <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                                    <input type="radio" name="q${question.id}" value="${letter}" class="w-4 h-4 text-primary">
                                    <span>${option}</span>
                                </label>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(questionBlock);
            });
            window.scrollTo(0, 0);
        }

        function finishTest() {
            let correctCount = 0;
            let wrongAnswers = []; // Массив для хранения ошибок

            currentQuestions.forEach(question => {
                // Ищем выбранный пользователем вариант
                const selected = document.querySelector(`input[name="q${question.id}"]:checked`);
                const userChoice = selected ? selected.value : "Жауап берілмеді";

                if (selected && selected.value === question.correct) {
                    correctCount++;
                } else {
                    // Если ответ неверный, добавляем в список ошибок
                    wrongAnswers.push({
                        question: question.question,
                        correctAnswer: question.correct,
                        userAnswer: userChoice,
                        options: question.options
                    });
                }
            });

            // Показываем страницу результатов
            document.getElementById('testPage').className = 'hidden';
            document.getElementById('resultPage').className = 'block';
            
            // Заполняем цифры
            document.getElementById('totalQuestions').innerText = currentQuestions.length;
            document.getElementById('correctAnswers').innerText = correctCount;
            document.getElementById('resultPercent').innerText = Math.round((correctCount / currentQuestions.length) * 100) + '%';

            // Выводим список ошибок
            const listContainer = document.getElementById('wrongAnswersList');
            const block = document.getElementById('wrongAnswersBlock');
            
            listContainer.innerHTML = ''; // Очищаем старое

            if (wrongAnswers.length > 0) {
                block.classList.remove('hidden'); // Показываем блок, если есть ошибки
                wrongAnswers.forEach((item, index) => {
                    const errorItem = document.createElement('div');
                    errorItem.className = 'p-4 border-l-4 border-danger bg-red-50 rounded-r-lg';
                    
                    // Находим полный текст правильного ответа из массива options
                    const correctText = item.options.find(opt => opt.startsWith(item.correctAnswer)) || item.correctAnswer;
                    
                    errorItem.innerHTML = `
                        <p class="font-bold text-sm mb-1">${index + 1}. ${item.question}</p>
                        <p class="text-xs text-red-600">Сіздің жауабыңыз: ${item.userAnswer}</p>
                        <p class="text-xs text-green-600 font-semibold">Дұрыс жауап: ${correctText}</p>
                    `;
                    listContainer.appendChild(errorItem);
                });
            } else {
                block.classList.add('hidden'); // Прячем, если ошибок нет (идеальный результат!)
            }
            window.scrollTo(0, 0); // Прокручиваем вверх, чтобы увидеть результат
        }
    </script>
</body>
</html>
